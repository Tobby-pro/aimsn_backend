version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: aimsn_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aimsn_user
      POSTGRES_PASSWORD: aimsn_password
      POSTGRES_DB: aimsn_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
